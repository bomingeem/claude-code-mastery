<!DOCTYPE html>
<html class="scroll-smooth dark" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="간단하고 효율적인 투두리스트 앱 - 일정 관리를 쉽게 하세요.">
    <meta name="keywords" content="투두, 할일, 리스트, 일정 관리">
    <meta name="author" content="개발자">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind 커스텀 설정 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        dark: {
                            bg: '#0f172a',
                            surface: '#1e293b',
                            border: '#334155',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            },
            darkMode: 'class',
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <!-- 커스텀 CSS -->
    <link rel="stylesheet" href="todo.css">

    <title>투두리스트 - 할 일 관리</title>
</head>
<body class="bg-dark-bg text-gray-100">

    <!-- ==================== 헤더 ==================== -->
    <header class="bg-dark-surface/80 backdrop-blur-md border-b border-dark-border sticky top-0 z-40">
        <div class="max-w-2xl mx-auto px-4 py-6 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold text-white">투두 앱</h1>
                <p class="text-sm text-gray-400 mt-1">오늘도 화이팅!</p>
            </div>
            <a href="index.html" class="px-4 py-2 border-2 border-primary text-primary hover:bg-primary/10 rounded-lg font-semibold transition-colors">
                ← 포트폴리오
            </a>
        </div>
    </header>

    <!-- ==================== 메인 콘텐츠 ==================== -->
    <main id="todo-app" class="max-w-2xl mx-auto px-4 py-8 min-h-screen">

        <!-- ==================== 입력 섹션 ==================== -->
        <section id="todo-input-section" class="mb-8">
            <form id="todo-form" class="flex gap-2">
                <input
                    id="todo-input"
                    type="text"
                    placeholder="새로운 할 일 추가..."
                    aria-label="새 투두 입력"
                    class="flex-1 px-4 py-3 bg-dark-surface border-2 border-dark-border rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-primary focus:shadow-lg focus:shadow-primary/20 transition-all"
                >
                <button
                    id="add-btn"
                    type="submit"
                    aria-label="투두 추가"
                    class="px-6 py-3 bg-primary text-white font-bold rounded-lg hover:bg-blue-600 active:scale-95 transition-all"
                >
                    +
                </button>
            </form>
            <p id="input-error" class="text-red-400 text-sm mt-2 hidden">공백은 입력할 수 없습니다.</p>
        </section>

        <!-- ==================== 필터 섹션 ==================== -->
        <section id="filter-section" class="mb-8 flex flex-wrap gap-3 justify-center sm:justify-start">
            <button
                data-filter="all"
                class="filter-btn px-6 py-2 rounded-full border-2 border-primary text-primary bg-primary/10 font-semibold transition-all active"
                aria-pressed="true"
            >
                전체
            </button>
            <button
                data-filter="active"
                class="filter-btn px-6 py-2 rounded-full border-2 border-gray-600 text-gray-300 hover:border-primary hover:text-primary transition-all"
                aria-pressed="false"
            >
                진행중
            </button>
            <button
                data-filter="completed"
                class="filter-btn px-6 py-2 rounded-full border-2 border-gray-600 text-gray-300 hover:border-primary hover:text-primary transition-all"
                aria-pressed="false"
            >
                완료
            </button>
        </section>

        <!-- ==================== 투두 리스트 섹션 ==================== -->
        <section id="todo-list-section" class="bg-dark-surface/50 border border-dark-border rounded-lg p-6">
            <ul
                id="todo-list"
                role="list"
                class="space-y-2"
            >
                <!-- JS가 동적으로 렌더링 -->
            </ul>

            <!-- 빈 상태 메시지 -->
            <div id="empty-state" class="text-center py-12 hidden">
                <svg class="w-16 h-16 mx-auto text-gray-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                </svg>
                <p class="text-gray-400 text-lg font-semibold mb-2">아직 할 일이 없습니다</p>
                <p class="text-gray-500">위에 새로운 할 일을 추가해보세요!</p>
            </div>
        </section>

        <!-- ==================== 푸터 ==================== -->
        <footer id="todo-footer" class="mt-8 flex flex-col sm:flex-row justify-between items-center gap-4 text-gray-400">
            <div>
                <span id="items-count" class="font-semibold">0개 항목 남음</span>
            </div>
            <button
                id="clear-completed-btn"
                class="px-4 py-2 border-2 border-gray-600 text-gray-400 hover:border-red-500 hover:text-red-400 rounded-lg font-semibold transition-all"
            >
                완료 항목 삭제
            </button>
        </footer>

    </main>

    <!-- JavaScript 파일 -->
    <script src="todo.js"></script>
</body>
</html>
